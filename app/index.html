<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LP / SP Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
  <!-- ── Tracker Screen ──────────────────── -->
  <div id="tracker-screen">
    <!-- Hamburger Menu -->
    <button class="hamburger" id="hamburger-btn" aria-label="Select hero">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- LP Section (top half) -->
    <section class="tracker-section lp-section" id="lp-section">
      <div class="watermark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
            2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
            C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
            c0 3.78-3.4 6.86-8.55 11.54z"/>
        </svg>
      </div>
      <button class="btn btn-plus" data-stat="lp" data-action="increment" aria-label="Increase LP">
        <span class="btn-symbol">+</span>
      </button>
      <div class="stat-display">
        <span class="stat-value" id="lp-value">20</span>
      </div>
      <button class="btn btn-minus" data-stat="lp" data-action="decrement" aria-label="Decrease LP">
        <span class="btn-symbol">&minus;</span>
      </button>
    </section>

    <!-- SP Section (bottom half) -->
    <section class="tracker-section sp-section" id="sp-section">
      <div class="watermark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4C6 4 1.5 10 1 12c.5 2 5 8 11 8s10.5-6 11-8
            c-.5-2-5-8-11-8zm0 2c4.5 0 8 4.2 8.8 6-.8 1.8-4.3 6-8.8
            6s-8-4.2-8.8-6c.8-1.8 4.3-6 8.8-6z"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="12" cy="12" r="2" opacity="0.3"/>
          <path d="M3.5 7L1.5 4.5M20.5 7l2-2.5M3.5 17L1.5 19.5M20.5 17l2 2.5"
            stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <button class="btn btn-plus" data-stat="sp" data-action="increment" aria-label="Increase SP">
        <span class="btn-symbol">+</span>
      </button>
      <div class="stat-display">
        <span class="stat-value" id="sp-value">20</span>
      </div>
      <button class="btn btn-minus" data-stat="sp" data-action="decrement" aria-label="Decrease SP">
        <span class="btn-symbol">&minus;</span>
      </button>
    </section>

    <!-- Essence Section (bottom strip) -->
    <section class="tracker-section essence-section" id="essence-section">
      <div class="watermark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1L5.5 5.5L4 12L5.5 18.5L12 23L18.5 18.5L20 12L18.5 5.5Z"/>
          <path d="M12 1L5.5 5.5L4 12L12 12Z" opacity="0.3"/>
          <path d="M12 1L18.5 5.5L20 12L12 12Z" opacity="0.15"/>
          <path d="M12 23L5.5 18.5L4 12L12 12Z" opacity="0.15"/>
          <path d="M12 23L18.5 18.5L20 12L12 12Z" opacity="0.3"/>
        </svg>
      </div>
      <button class="btn essence-btn" data-stat="essence" data-action="increment" aria-label="Increase Essence">
        <span class="btn-symbol">+</span>
      </button>
      <div class="essence-display">
        <button class="essence-value-btn" id="essence-reset" aria-label="Reset Essence">
          <span class="stat-value essence-stat-value" id="essence-value">0</span>
        </button>
      </div>
      <button class="btn essence-btn" data-stat="essence" data-action="decrement" aria-label="Decrease Essence">
        <span class="btn-symbol">&minus;</span>
      </button>
    </section>
  </div>

  <!-- ── Hero Select Screen ──────────────── -->
  <div id="select-screen" class="hidden">
    <h1 class="select-title">Choose Your Hero</h1>
    <label class="toggle-row">
      <span class="toggle-label">Show Essence</span>
      <div class="toggle-switch">
        <input type="checkbox" id="show-essence-toggle" checked>
        <span class="toggle-slider"></span>
      </div>
    </label>
    <div class="hero-grid" id="hero-grid"></div>
  </div>

  </div><!-- .app-shell -->
  <script src="app.js"></script>
</body>
</html>
